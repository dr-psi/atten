<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkScan — ระบบเช็คชื่อเข้างาน</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #0f1625;
    --border: #1e2d4a;
    --accent: #00e5ff;
    --green: #00ff88;
    --red: #ff3b6b;
    --yellow: #ffd600;
    --text: #c8d8f0;
    --dim: #4a6080;
    --scan: rgba(0,229,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .logo span { color: var(--green); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--dim);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--red);
    font-size: 11px;
    letter-spacing: 2px;
  }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse-red 1.2s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,59,107,0.4); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(255,59,107,0); }
  }

  #clock {
    color: var(--accent);
    font-size: 14px;
  }

  /* MAIN LAYOUT */
  .main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
    padding: 20px 28px;
    height: calc(100vh - 65px);
  }

  /* LEFT — CAMERA */
  .cam-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .cam-wrapper {
    position: relative;
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }

  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
  }
  .corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

  /* SCAN LINE */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s linear infinite;
    opacity: 0.6;
  }

  @keyframes scan {
    0% { top: 10%; }
    100% { top: 90%; }
  }

  /* DETECTION BOX ON VIDEO */
  .detect-box {
    position: absolute;
    border: 2px solid var(--green);
    border-radius: 2px;
    pointer-events: none;
    transition: all 0.15s ease;
    box-shadow: 0 0 12px rgba(0,255,136,0.3), inset 0 0 12px rgba(0,255,136,0.05);
  }

  .detect-label {
    position: absolute;
    top: -26px; left: -2px;
    background: var(--green);
    color: #000;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 8px;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .detect-conf {
    position: absolute;
    bottom: -22px; left: -2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--green);
    letter-spacing: 1px;
  }

  /* ALERT OVERLAY */
  .alert-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }

  .alert-overlay.show { opacity: 1; }

  .alert-box {
    background: rgba(0,0,0,0.85);
    border: 2px solid var(--green);
    padding: 20px 36px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,136,0.4);
    animation: pop-in 0.25s ease;
  }

  .alert-box.denied {
    border-color: var(--red);
    box-shadow: 0 0 40px rgba(255,59,107,0.4);
  }

  @keyframes pop-in {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .alert-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green);
    margin-bottom: 6px;
  }

  .alert-box.denied .alert-status { color: var(--red); }

  .alert-name {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  .alert-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    margin-top: 4px;
  }

  .alert-progress {
    margin-top: 14px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .alert-progress-bar {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.05s linear;
  }

  .alert-box.denied .alert-progress-bar { background: var(--red); }

  /* CAM CONTROLS */
  .cam-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .btn:hover {
    background: rgba(0,229,255,0.1);
    box-shadow: 0 0 16px rgba(0,229,255,0.2);
  }

  .btn.active {
    background: var(--accent);
    color: #000;
    font-weight: bold;
  }

  .btn.red {
    border-color: var(--red);
    color: var(--red);
  }
  .btn.red:hover { background: rgba(255,59,107,0.1); }

  .status-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-left: auto;
    letter-spacing: 1px;
  }

  #statusText { color: var(--accent); }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow: hidden;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,229,255,0.03);
  }

  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .panel-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }

  .stat-cell {
    padding: 14px 12px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-cell:last-child { border-right: none; }

  .stat-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    font-weight: bold;
    line-height: 1;
  }

  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.yellow { color: var(--yellow); }

  .stat-label {
    font-size: 10px;
    color: var(--dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* EMPLOYEE REGISTER */
  .register-form {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
  }

  .field input, .field select {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,229,255,0.15);
  }

  .field select option { background: #0f1625; }

  /* LOG LIST */
  .log-list {
    padding: 0;
    overflow-y: auto;
    max-height: 280px;
    flex: 1;
  }

  .log-item {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(30,45,74,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slide-in 0.3s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .log-dot.in { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .log-dot.out { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .log-dot.deny { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .log-info { flex: 1; }

  .log-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .log-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-top: 2px;
  }

  .log-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    text-align: right;
    white-space: nowrap;
  }

  .log-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .log-badge.in { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .log-badge.out { background: rgba(255,214,0,0.1); color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
  .log-badge.deny { background: rgba(255,59,107,0.1); color: var(--red); border: 1px solid rgba(255,59,107,0.3); }

  /* MOTION INDICATOR */
  .motion-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
  }

  .motion-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    width: 60px;
  }

  .motion-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }

  .motion-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s ease;
    border-radius: 2px;
  }

  .motion-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    width: 35px;
    text-align: right;
  }

  /* EMPLOYEE LIST CHIPS */
  .emp-chips {
    padding: 10px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .emp-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .emp-chip:hover {
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .emp-chip.present {
    border-color: rgba(0,255,136,0.4);
    background: rgba(0,255,136,0.05);
  }

  .emp-chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
  }

  .emp-chip.present .emp-chip-dot {
    background: var(--green);
    box-shadow: 0 0 4px var(--green);
  }

  .emp-chip-name { color: var(--text); font-weight: 600; }
  .emp-chip-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
  }

  /* SIMULATE BTN */
  .sim-controls {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .sim-btn {
    flex: 1;
    min-width: 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sim-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,136,0.05);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">WORK<span>SCAN</span></div>
  <div class="header-status">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div id="clock">--:--:--</div>
    <div id="dateDisp">--/--/----</div>
  </div>
</header>

<div class="main">

  <!-- LEFT: CAMERA -->
  <div class="cam-section">
    <div class="cam-wrapper" id="camWrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>

      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>

      <!-- Detection boxes will be injected here -->

      <!-- Alert Overlay -->
      <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box" id="alertBox">
          <div class="alert-status" id="alertStatus">AUTHORIZED</div>
          <div class="alert-name" id="alertName">—</div>
          <div class="alert-id" id="alertId">ID-000 • —</div>
          <div class="alert-progress">
            <div class="alert-progress-bar" id="alertProgress"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Motion bar -->
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:4px;">
      <div class="motion-bar">
        <div class="motion-label">MOTION</div>
        <div class="motion-track"><div class="motion-fill" id="motionFill"></div></div>
        <div class="motion-val" id="motionVal">0%</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="cam-controls">
      <button class="btn" id="btnCam" onclick="startCamera()">▶ เปิดกล้อง</button>
      <button class="btn red" onclick="stopCamera()">■ หยุด</button>
      <div class="status-bar">สถานะ: <span id="statusText">รอการเชื่อมต่อ</span></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- STATS -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">สรุปวันนี้</div>
        <div class="panel-count" id="dateSmall">—</div>
      </div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num green" id="statIn">0</div>
          <div class="stat-label">เข้างาน</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num yellow" id="statOut">0</div>
          <div class="stat-label">ออกงาน</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num red" id="statDeny">0</div>
          <div class="stat-label">ไม่ระบุ</div>
        </div>
      </div>
    </div>

    <!-- EMPLOYEE LIST -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">พนักงาน</div>
        <div class="panel-count" id="empCountDisp">0 คน</div>
      </div>
      <div class="emp-chips" id="empChips"></div>
      <div class="register-form">
        <div class="input-row">
          <div class="field">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="newName" placeholder="เช่น สมชาย ใจดี">
          </div>
          <div class="field" style="max-width:90px">
            <label>แผนก</label>
            <select id="newDept">
              <option>ผลิต</option>
              <option>คลัง</option>
              <option>QC</option>
              <option>บัญชี</option>
              <option>IT</option>
            </select>
          </div>
        </div>
        <button class="btn" style="font-size:11px;padding:9px" onclick="addEmployee()">+ เพิ่มพนักงาน</button>
      </div>
    </div>

    <!-- LOG -->
    <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <div class="panel-header">
        <div class="panel-title">บันทึกการเข้า-ออก</div>
        <div class="panel-count" id="logCount">0 รายการ</div>
      </div>
      <div class="log-list" id="logList"></div>
      <div class="sim-controls" id="simControls"></div>
    </div>

  </div>
</div>

<script>
// ==================== STATE ====================
const employees = [
  { id: 'EMP-001', name: 'สมชาย ใจดี', dept: 'ผลิต', present: false },
  { id: 'EMP-002', name: 'วิภา รักงาน', dept: 'QC', present: false },
  { id: 'EMP-003', name: 'ประเสริฐ มั่นคง', dept: 'คลัง', present: false },
  { id: 'EMP-004', name: 'นภา สดใส', dept: 'บัญชี', present: false },
];

let logs = [];
let statIn = 0, statOut = 0, statDeny = 0;
let stream = null;
let motionDetecting = false;
let prevFrame = null;
let motionCanvas = null, motionCtx = null;
let detectInterval = null;
let alertTimeout = null;
let alertAnimFrame = null;
let lastDetect = 0;
const DETECT_COOLDOWN = 4000; // ms between detections

// ==================== CLOCK ====================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('th-TH', { hour12: false });
  const d = now.toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit', year:'numeric' });
  document.getElementById('dateDisp').textContent = d;
  document.getElementById('dateSmall').textContent = d;
}
setInterval(updateClock, 1000);
updateClock();

// ==================== EMPLOYEES ====================
function renderEmpChips() {
  const c = document.getElementById('empChips');
  c.innerHTML = '';
  employees.forEach((e, i) => {
    const chip = document.createElement('div');
    chip.className = 'emp-chip' + (e.present ? ' present' : '');
    chip.innerHTML = `
      <div class="emp-chip-dot"></div>
      <span class="emp-chip-name">${e.name.split(' ')[0]}</span>
      <span class="emp-chip-id">${e.id}</span>
    `;
    chip.title = `${e.name} | ${e.dept}`;
    chip.onclick = () => simulateDetect(i);
    c.appendChild(chip);
  });
  document.getElementById('empCountDisp').textContent = employees.length + ' คน';
  renderSimButtons();
}

function addEmployee() {
  const name = document.getElementById('newName').value.trim();
  const dept = document.getElementById('newDept').value;
  if (!name) return;
  const id = 'EMP-' + String(employees.length + 1).padStart(3, '0');
  employees.push({ id, name, dept, present: false });
  document.getElementById('newName').value = '';
  renderEmpChips();
}

// ==================== SIMULATION BUTTONS ====================
function renderSimButtons() {
  const sc = document.getElementById('simControls');
  sc.innerHTML = '';
  employees.slice(0, 4).forEach((e, i) => {
    const b = document.createElement('button');
    b.className = 'sim-btn';
    b.textContent = e.name.split(' ')[0];
    b.title = 'จำลองตรวจจับ: ' + e.name;
    b.onclick = () => simulateDetect(i);
    sc.appendChild(b);
  });

  // Unknown
  const bunk = document.createElement('button');
  bunk.className = 'sim-btn';
  bunk.textContent = '⚠ ไม่รู้จัก';
  bunk.title = 'จำลองคนแปลกหน้า';
  bunk.onclick = () => showAlert(null, Math.round(Math.random() * 30 + 20));
  sc.appendChild(bunk);
}

// ==================== CAMERA ====================
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('statusText').textContent = 'กล้องทำงาน';
    document.getElementById('btnCam').classList.add('active');

    // Setup motion canvas
    motionCanvas = document.createElement('canvas');
    motionCtx = motionCanvas.getContext('2d');
    video.addEventListener('loadeddata', () => {
      motionCanvas.width = 160;
      motionCanvas.height = 90;
      startMotionDetection();
    });

    // Start fake person detection
    detectInterval = setInterval(tryAutoDetect, 800);
  } catch(e) {
    document.getElementById('statusText').textContent = 'ไม่สามารถเปิดกล้องได้';
    console.error(e);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (detectInterval) { clearInterval(detectInterval); detectInterval = null; }
  document.getElementById('video').srcObject = null;
  document.getElementById('statusText').textContent = 'หยุดแล้ว';
  document.getElementById('btnCam').classList.remove('active');
  setMotion(0);
  clearDetectBoxes();
}

// ==================== MOTION DETECTION ====================
function startMotionDetection() {
  function loop() {
    if (!stream) return;
    const video = document.getElementById('video');
    if (video.readyState < 2) { requestAnimationFrame(loop); return; }
    motionCtx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
    const curr = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
    if (prevFrame) {
      let diff = 0;
      for (let i = 0; i < curr.data.length; i += 4) {
        diff += Math.abs(curr.data[i] - prevFrame.data[i]);
      }
      const pct = Math.min(100, Math.round(diff / (motionCanvas.width * motionCanvas.height) / 2));
      setMotion(pct);
    }
    prevFrame = curr;
    requestAnimationFrame(loop);
  }
  loop();
}

function setMotion(pct) {
  document.getElementById('motionFill').style.width = pct + '%';
  document.getElementById('motionVal').textContent = pct + '%';
}

// ==================== AUTO DETECT ====================
let motionAccum = 0;
let motionSamples = [];

function tryAutoDetect() {
  const fill = parseFloat(document.getElementById('motionFill').style.width) || 0;
  motionSamples.push(fill);
  if (motionSamples.length > 5) motionSamples.shift();
  const avg = motionSamples.reduce((a, b) => a + b, 0) / motionSamples.length;

  const now = Date.now();
  if (avg > 8 && (now - lastDetect) > DETECT_COOLDOWN) {
    // Pick random employee or unknown
    const roll = Math.random();
    if (roll < 0.75) {
      const idx = Math.floor(Math.random() * employees.length);
      simulateDetect(idx, true);
    } else {
      showAlert(null, Math.round(Math.random() * 25 + 15));
    }
  }
}

// ==================== DETECT SIMULATION ====================
function simulateDetect(idx, fromMotion = false) {
  const emp = employees[idx];
  const conf = Math.round(Math.random() * 12 + 85);
  showDetectBox(conf);
  showAlert(emp, conf);
  lastDetect = Date.now();
}

// ==================== DETECT BOX ====================
function showDetectBox(conf) {
  clearDetectBoxes();
  const wrapper = document.getElementById('camWrapper');
  const w = wrapper.clientWidth, h = wrapper.clientHeight;

  // Random box position (simulate face area)
  const bw = Math.round(w * 0.18 + Math.random() * w * 0.1);
  const bh = Math.round(bw * 1.3);
  const bx = Math.round(Math.random() * (w - bw - 60) + 30);
  const by = Math.round(Math.random() * (h * 0.4) + h * 0.1);

  const box = document.createElement('div');
  box.className = 'detect-box';
  box.id = 'detectBox';
  box.style.cssText = `left:${bx}px;top:${by}px;width:${bw}px;height:${bh}px`;
  box.innerHTML = `
    <div class="detect-conf">${conf}% MATCH</div>
  `;
  wrapper.appendChild(box);

  setTimeout(() => {
    const b = document.getElementById('detectBox');
    if (b) b.remove();
  }, 3500);
}

function clearDetectBoxes() {
  const old = document.getElementById('detectBox');
  if (old) old.remove();
}

// ==================== ALERT ====================
function showAlert(emp, conf) {
  const overlay = document.getElementById('alertOverlay');
  const box = document.getElementById('alertBox');
  const status = document.getElementById('alertStatus');
  const nameEl = document.getElementById('alertName');
  const idEl = document.getElementById('alertId');
  const progress = document.getElementById('alertProgress');

  if (alertTimeout) clearTimeout(alertTimeout);
  if (alertAnimFrame) cancelAnimationFrame(alertAnimFrame);

  if (emp) {
    box.classList.remove('denied');
    status.textContent = 'AUTHORIZED — ' + Math.round(conf) + '%';
    nameEl.textContent = emp.name;
    idEl.textContent = emp.id + ' • ' + emp.dept;

    // Toggle presence
    const action = emp.present ? 'out' : 'in';
    emp.present = !emp.present;
    addLog(emp, action, conf);
    renderEmpChips();
  } else {
    box.classList.add('denied');
    status.textContent = 'UNKNOWN — ' + conf + '%';
    nameEl.textContent = 'ไม่ระบุตัวตน';
    idEl.textContent = 'ไม่อยู่ในระบบ';
    addLog(null, 'deny', conf);
  }

  overlay.classList.add('show');

  // Progress bar animation
  const bar = document.getElementById('alertProgress').querySelector('.alert-progress-bar') ||
               document.querySelector('.alert-progress-bar');
  bar.style.width = '0%';
  let pct = 0;
  const duration = 2800;
  const start = performance.now();
  function anim(now) {
    pct = Math.min(100, ((now - start) / duration) * 100);
    bar.style.width = pct + '%';
    if (pct < 100) alertAnimFrame = requestAnimationFrame(anim);
  }
  alertAnimFrame = requestAnimationFrame(anim);

  alertTimeout = setTimeout(() => {
    overlay.classList.remove('show');
  }, 3000);
}

// ==================== LOG ====================
function addLog(emp, type, conf) {
  const now = new Date();
  const time = now.toLocaleTimeString('th-TH', { hour12: false });
  const entry = { emp, type, conf: Math.round(conf), time };
  logs.unshift(entry);

  if (type === 'in') statIn++;
  else if (type === 'out') statOut++;
  else statDeny++;

  document.getElementById('statIn').textContent = statIn;
  document.getElementById('statOut').textContent = statOut;
  document.getElementById('statDeny').textContent = statDeny;
  document.getElementById('logCount').textContent = logs.length + ' รายการ';

  const list = document.getElementById('logList');
  const item = document.createElement('div');
  item.className = 'log-item';

  const dotClass = type === 'in' ? 'in' : type === 'out' ? 'out' : 'deny';
  const label = type === 'in' ? 'เข้างาน' : type === 'out' ? 'ออกงาน' : 'ไม่รู้จัก';
  const name = emp ? emp.name : 'ไม่ระบุตัวตน';
  const meta = emp ? `${emp.id} • ${emp.dept} • ${entry.conf}%` : `ความมั่นใจ: ${entry.conf}%`;

  item.innerHTML = `
    <div class="log-dot ${dotClass}"></div>
    <div class="log-info">
      <div class="log-name">${name}</div>
      <div class="log-meta">${meta}</div>
    </div>
    <div style="text-align:right">
      <div class="log-badge ${dotClass}">${label}</div>
      <div class="log-time" style="margin-top:4px">${time}</div>
    </div>
  `;
  list.prepend(item);
  if (list.children.length > 50) list.lastChild.remove();
}

// ==================== INIT ====================
renderEmpChips();
